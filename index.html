<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meccha Hide</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Meccha Hide</h1>
  <p class="tagline">Find them. Hide them. Paint them.</p>
</header>

<section id="auth-section">
  <div class="auth-box">
    <h2>Log In</h2>
    <form id="login-form">
      <input type="email" id="login-email" placeholder="Email" required>
      <input type="password" id="login-password" placeholder="Password" required>
      <button type="submit">Log In</button>
    </form>
  </div>

  <div class="auth-box">
    <h2>Sign Up</h2>
    <form id="signup-form">
      <input type="email" id="signup-email" placeholder="Email" required>
      <input type="password" id="signup-password" placeholder="Password (6+ characters)" required minlength="6">
      <button type="submit">Sign Up</button>
    </form>
  </div>

  <p id="auth-status"></p>
</section>

<section id="app-section" style="display:none;">
  <div class="topbar">
    <span>Logged in as <strong id="user-email"></strong></span>
    <button id="logout-btn">Log Out</button>
  </div>

  <p style="text-align:center; color:#888; margin-top:40px;">
    Map and hide-posting coming in the next step.
  </p>
</section>

<script type="module" src="firebase-config.js"></script>
<script type="module" src="auth.js"></script>
</body>
</html>
